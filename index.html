<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RideSync - Elite Terminal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Orbitron:wght@400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        display: ['Orbitron', 'sans-serif'],
                        mono: ['Space Mono', 'monospace'],
                    },
                    colors: {
                        brand: {
                            orange: '#FF3D00', 
                            red: '#D32F2F',
                            dark: '#050505',   
                            gray: '#141414',   
                            metal: '#2A2B2E',  
                            light: '#A0A0A0'   
                        }
                    },
                    boxShadow: {
                        'neon': '0 0 15px rgba(255, 61, 0, 0.4)',
                        'neon-intense': '0 0 40px rgba(255, 61, 0, 0.6), inset 0 0 20px rgba(255, 61, 0, 0.2)',
                        'machined': 'inset 0 1px 1px rgba(255,255,255,0.1), 0 10px 20px rgba(0,0,0,0.8), 0 2px 5px rgba(0,0,0,0.5)',
                        'machined-pressed': 'inset 0 4px 8px rgba(0,0,0,0.8), 0 1px 2px rgba(255,255,255,0.05)'
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: #000;
            background-image: radial-gradient(circle at 50% 50%, #111 0%, #000 100%);
            color: #fff;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            overflow: hidden; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Desktop Presentation Frame (Scales perfectly) */
        .device-frame {
            position: relative;
            width: 100%;
            height: 100dvh;
            max-width: 440px;
            max-height: 950px;
            background: #000;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(255, 61, 0, 0.05), 0 0 100px rgba(0, 0, 0, 1);
        }
        @media (min-width: 480px) {
            .device-frame {
                height: 90dvh;
                border-radius: 40px;
                border: 8px solid #1a1a1a;
                border-top-width: 12px;
                border-bottom-width: 12px;
            }
            .device-frame::after {
                content: '';
                position: absolute;
                top: 0; left: 50%; transform: translateX(-50%);
                width: 120px; height: 25px;
                background: #000;
                border-bottom-left-radius: 15px;
                border-bottom-right-radius: 15px;
                z-index: 999; /* Mock Notch */
            }
        }

        /* Garage Shutter & Physics */
        .shutter-image-container {
            position: absolute;
            inset: 0;
            z-index: 100;
            background-color: #050505;
            background-image: url('RideSync.Shutter.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            will-change: transform;
            border-bottom: 4px solid #2A2B2E;
            box-shadow: inset 0 -20px 40px rgba(0,0,0,0.8);
        }

        .vignette-overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 45%, transparent 10%, rgba(0,0,0,0.6) 60%, rgba(0,0,0,1) 100%);
            z-index: 101;
            pointer-events: none;
            animation: vignettePulse 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes vignettePulse {
            0% { opacity: 0; }
            20% { opacity: 1; filter: contrast(1.1) brightness(0.7); }
            80% { opacity: 1; filter: contrast(1.3) brightness(1.2); }
            100% { opacity: 1; filter: contrast(1.2) brightness(1); }
        }

        .floor-glow {
            position: absolute;
            bottom: -80px;
            left: 50%;
            transform: translateX(-50%);
            width: 200%;
            height: 80px;
            background: radial-gradient(ellipse at top, rgba(255, 61, 0, 0.9) 0%, rgba(255, 61, 0, 0.2) 40%, transparent 70%);
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 99;
            filter: blur(5px);
        }

        .shutter-open {
            transition: transform 1.2s cubic-bezier(0.7, 0, 0.1, 1);
            transform: translateY(-105%);
        }

        /* App Interior */
        .dashboard-bg {
            background-color: #050505;
            position: relative;
        }

        /* Carbon Tread Background */
        .tread-pattern {
            position: absolute;
            inset: 0;
            opacity: 0.2;
            background: repeating-linear-gradient(45deg, #020202, #020202 10px, #0a0a0a 10px, #0a0a0a 20px);
            z-index: 0;
            mask-image: radial-gradient(circle at 50% 100%, black 30%, transparent 90%);
            -webkit-mask-image: radial-gradient(circle at 50% 100%, black 30%, transparent 90%);
        }

        /* HUD Corners */
        .hud-corner {
            position: absolute;
            width: 20px; height: 20px;
            border: 2px solid rgba(255, 61, 0, 0.3);
            z-index: 5;
        }
        .hud-tl { top: 60px; left: 20px; border-right: none; border-bottom: none; }
        .hud-tr { top: 60px; right: 20px; border-left: none; border-bottom: none; }
        .hud-bl { bottom: 20px; left: 20px; border-right: none; border-top: none; }
        .hud-br { bottom: 20px; right: 20px; border-left: none; border-top: none; }

        /* Staggered Animations */
        .stagger-item {
            opacity: 0;
            transform: translateY(40px) scale(0.98);
            transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .dashboard-revealed .stagger-item {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* Dynamic Slider Items - NOW SCROLLING RIGHT TO LEFT */
        .slide-item {
            position: absolute;
            inset: 0;
            opacity: 0;
            transform: translateX(100%) scale(0.95);
            transition: all 0.7s cubic-bezier(0.7, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            padding: 0 1.5rem;
            text-align: center;
        }
        .slide-item.active {
            opacity: 1;
            transform: translateX(0) scale(1);
            z-index: 10;
        }
        .slide-item.exit {
            opacity: 0;
            transform: translateX(-100%) scale(0.95);
            z-index: 1;
        }

        /* Capsule Buttons */
        .capsule-btn {
            width: 100%;
            border-radius: 9999px;
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            transition: all 0.2s ease;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }
        .capsule-google {
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .capsule-google:active { transform: scale(0.96); background: rgba(255,255,255,0.1); }
        
        .capsule-phone {
            border: 1px solid rgba(255, 61, 0, 0.6);
            background: rgba(255, 61, 0, 0.1);
            color: #FF3D00;
            box-shadow: 0 4px 15px rgba(255,61,0,0.15), inset 0 0 10px rgba(255,61,0,0.05);
        }
        .capsule-phone:active { transform: scale(0.96); background: rgba(255,61,0,0.2); }

        /* Inputs & Key Fob */
        .neon-input-container {
            position: relative;
        }
        .neon-input-container::after {
            content: '';
            position: absolute;
            bottom: 0; left: 50%;
            transform: translateX(-50%);
            width: 0; height: 2px;
            background: #FF3D00;
            transition: width 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 0 10px #FF3D00;
        }
        .neon-input-container:focus-within::after { width: 100%; }

        .neon-input {
            background: rgba(0,0,0,0.6);
            border: 1px solid #333;
            color: #fff;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.8);
        }
        .neon-input:focus {
            outline: none;
            border-color: rgba(255, 61, 0, 0.5);
            background: rgba(20, 5, 0, 0.6);
        }

        .key-fob {
            background: linear-gradient(145deg, #222, #050505);
            box-shadow: 5px 5px 10px #000, -2px -2px 5px rgba(255,255,255,0.05), inset 0 0 10px rgba(0,0,0,0.8);
            position: relative;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .key-fob::after {
            content: ''; position: absolute; inset: 4px;
            border-radius: 50%; border: 1px dashed rgba(255,255,255,0.2);
            transition: all 0.3s ease;
        }
        .key-fob:active { box-shadow: inset 5px 5px 10px #000; }
        .key-fob:hover::after { border-color: rgba(255,61,0,0.5); }
        .key-fob.turning::after { border-color: #FF3D00; transform: rotate(45deg); }
        .key-icon-turn { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), color 0.3s; }
        .key-fob.turning .key-icon-turn { transform: rotate(90deg); color: #FF3D00; }

        /* Dynamic Ignition 2.0 */
        .ignition-wrapper {
            position: relative; width: 100px; height: 100px;
            display: flex; align-items: center; justify-content: center;
        }
        .ignition-ring {
            position: absolute; inset: 0;
            border-radius: 50%; border: 2px dashed #444;
            transition: all 0.5s ease;
        }
        .ignition-btn {
            width: 80px; height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle, #2a2b2e 0%, #111 100%);
            border: 2px solid #333;
            position: relative; cursor: pointer;
            transition: all 0.2s ease;
            display: flex; align-items: center; justify-content: center;
            z-index: 2;
        }
        .ignition-btn::before {
            content: ''; position: absolute; inset: 6px;
            border-radius: 50%; background: linear-gradient(135deg, #1a1a1a, #050505);
            border: 1px solid #444; transition: all 0.3s ease;
        }
        
        .glowing .ignition-ring {
            border-color: #FF3D00; animation: spin-slow 10s linear infinite;
            box-shadow: 0 0 20px rgba(255, 61, 0, 0.2);
        }
        .glowing .ignition-btn::before {
            background: radial-gradient(circle, #FF3D00 0%, #8a2100 100%);
            box-shadow: inset 0 0 10px #000, 0 0 30px rgba(255, 61, 0, 0.6);
            border-color: #ff7a55; animation: heartbeat 1.5s infinite;
        }
        .glowing.success .ignition-btn::before {
            background: radial-gradient(circle, #22c55e 0%, #14532d 100%);
            box-shadow: inset 0 0 10px #000, 0 0 40px rgba(34, 197, 94, 0.8);
            border-color: #4ade80; animation: none;
        }
        .glowing.success .ignition-ring {
            border-color: #22c55e; animation: spin-fast 1s ease-out forwards;
        }
        .ignition-btn:active { transform: scale(0.92); }

        @keyframes heartbeat {
            0%, 30%, 100% { transform: scale(1); filter: brightness(1); }
            15%, 45% { transform: scale(1.05); filter: brightness(1.2); }
        }
        @keyframes spin-slow { 100% { transform: rotate(360deg); } }
        @keyframes spin-fast { 100% { transform: rotate(720deg); } }

        /* View transitions */
        .view-container { perspective: 1200px; }
        .view-frame { transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1); }

        /* Toast HUD */
        #toast {
            transform: translateY(-20px) scale(0.9);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0; pointer-events: none; backdrop-filter: blur(15px);
        }
        #toast.show { transform: translateY(0) scale(1); opacity: 1; }

        /* HIGH-END PAGE TRANSITION EFFECTS */
        .content-fade-out {
            transform: scale(0.92) translateY(30px) !important;
            filter: blur(18px) brightness(0.3) !important;
            opacity: 0 !important;
            transition: all 1.2s cubic-bezier(0.7, 0, 0.3, 1) !important;
            pointer-events: none;
        }
        
        #page-transition-overlay {
            backdrop-filter: blur(0px);
            -webkit-backdrop-filter: blur(0px);
        }
        #page-transition-overlay.engaging {
            background-color: rgba(0, 0, 0, 1) !important;
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            pointer-events: all;
        }
    </style>
</head>
<body>

    <!-- Main Device Frame -->
    <main class="device-frame dashboard-bg">
        
        <!-- Background Textures -->
        <div class="tread-pattern transition-all duration-1000" id="tread-bg"></div>
        <div class="hud-corner hud-tl transition-opacity duration-500" id="corner-1"></div>
        <div class="hud-corner hud-tr transition-opacity duration-500" id="corner-2"></div>
        <div class="hud-corner hud-bl transition-opacity duration-500" id="corner-3"></div>
        <div class="hud-corner hud-br transition-opacity duration-500" id="corner-4"></div>

        <!-- Garage Shutter Overlay -->
        <div id="garage-shutter" class="shutter-image-container">
            <div class="vignette-overlay"></div>
            <div id="floor-glow" class="floor-glow"></div>
        </div>

        <!-- Dashboard Layout -->
        <div id="app-content" class="flex flex-col h-full w-full relative z-10 p-6 py-8 transform transition-all duration-[1200ms]">
            
            <!-- TOP AREA: Typographic Title -->
            <div class="stagger-item flex-shrink-0 flex flex-col w-full z-20 px-2 text-center" style="transition-delay: 0.1s;">
                <h1 class="font-display text-4xl font-black tracking-widest uppercase italic text-white drop-shadow-[0_0_15px_rgba(255,61,0,0.3)] leading-none">
                    Ride<span class="text-brand-orange">Sync</span>
                </h1>
            </div>

            <!-- MIDDLE AREA: Dynamic Slider -->
            <div class="flex-grow w-full relative z-20 overflow-hidden my-4" id="motive-slider">
                <!-- Javascript will inject sliding data items here -->
            </div>

            <!-- BOTTOM AREA: Fixed height container for Buttons & Forms -->
            <div class="relative w-full h-[220px] flex-shrink-0 view-container">
                
                <!-- VIEW 1: Main Login Options -->
                <div id="view-main" class="view-frame absolute w-full bottom-0 transform origin-bottom flex flex-col justify-end gap-4 z-20 opacity-100 h-full">
                    
                    <div class="p-2 flex flex-col gap-5 w-full bg-transparent mt-auto">
                        
                        <!-- Google Capsule -->
                        <button onclick="mockAction('Google Secure', this)" class="capsule-btn capsule-google">
                            <i class="ph-fill ph-google-logo text-xl"></i>
                            <span>Google Sign In</span>
                        </button>

                        <!-- Mobile Capsule -->
                        <button onclick="switchView('view-phone')" class="capsule-btn capsule-phone">
                            <i class="ph-bold ph-device-mobile text-xl"></i>
                            <span>Mobile Sign In</span>
                        </button>

                    </div>
                </div>

                <!-- VIEW 2: Phone Input & Ignition -->
                <div id="view-phone" class="view-frame absolute w-full bottom-0 transform origin-bottom translate-y-12 scale-[0.92] opacity-0 pointer-events-none flex flex-col justify-end gap-2 z-10 h-full">
                    
                    <button onclick="switchView('view-main')" class="absolute top-0 left-2 flex items-center gap-2 text-brand-light hover:text-white active:text-brand-orange transition-colors py-1 mb-2 group z-30">
                        <div class="w-8 h-8 rounded-full border border-brand-light group-hover:border-white flex items-center justify-center transition-colors">
                            <i class="ph-bold ph-caret-left text-sm"></i>
                        </div>
                        <span class="text-[11px] font-bold uppercase tracking-widest font-mono">Abort Protocol</span>
                    </button>

                    <div class="p-2 flex flex-col gap-4 w-full bg-transparent mt-auto">
                        <form onsubmit="handlePhoneSubmit(event)" class="space-y-4">
                            
                            <!-- Phone Input -->
                            <div id="phone-input-group" class="flex gap-3 transition-all duration-400">
                                <div class="neon-input-container relative w-24">
                                    <select class="neon-input w-full h-14 pl-3 pr-8 rounded-xl text-sm appearance-none font-bold text-center font-display tracking-wider">
                                        <option>+1</option>
                                        <option>+44</option>
                                        <option>+91</option>
                                    </select>
                                    <i class="ph-bold ph-caret-down absolute right-3 top-1/2 -translate-y-1/2 text-brand-light pointer-events-none text-xs"></i>
                                </div>
                                <div class="neon-input-container flex-grow">
                                    <input type="tel" id="phone-input" required placeholder="000-000-0000" pattern="[0-9]*" class="neon-input w-full h-14 px-4 rounded-xl text-lg font-bold tracking-widest font-mono" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                                </div>
                            </div>

                            <!-- OTP Sequence -->
                            <div id="otp-section" class="hidden flex-col items-center gap-4 pt-2">
                                <div class="w-full flex items-center gap-3">
                                    <div class="h-px bg-brand-orange opacity-30 flex-grow"></div>
                                    <label class="text-[9px] font-mono text-brand-orange uppercase tracking-[0.3em] animate-pulse">Awaiting Ignition Code</label>
                                    <div class="h-px bg-brand-orange opacity-30 flex-grow"></div>
                                </div>
                                
                                <div class="flex gap-3 justify-center w-full">
                                    <div class="neon-input-container"><input type="text" maxlength="1" inputmode="numeric" class="otp-box neon-input w-11 h-14 text-center text-xl font-bold rounded-xl font-mono"></div>
                                    <div class="neon-input-container"><input type="text" maxlength="1" inputmode="numeric" class="otp-box neon-input w-11 h-14 text-center text-xl font-bold rounded-xl font-mono"></div>
                                    <div class="neon-input-container"><input type="text" maxlength="1" inputmode="numeric" class="otp-box neon-input w-11 h-14 text-center text-xl font-bold rounded-xl font-mono"></div>
                                    <div class="neon-input-container"><input type="text" maxlength="1" inputmode="numeric" class="otp-box neon-input w-11 h-14 text-center text-xl font-bold rounded-xl font-mono"></div>
                                </div>

                                <!-- The Push-to-Start Button -->
                                <div class="mt-2 flex flex-col items-center gap-4">
                                    <div id="ignition-wrapper" class="ignition-wrapper">
                                        <div class="ignition-ring"></div>
                                        <button type="submit" id="ignition-btn" class="ignition-btn shadow-machined" disabled>
                                            <i id="ignition-icon" class="ph-bold ph-power text-2xl text-brand-dark z-10 opacity-50 transition-all"></i>
                                        </button>
                                    </div>
                                    <span class="text-[10px] font-display text-brand-light uppercase tracking-[0.2em] -mt-2">Push to Ignite</span>
                                </div>
                            </div>

                            <!-- Initial Send Button (Key Fob) -->
                            <div class="w-full flex flex-col items-center justify-center mt-2 pb-2" id="key-submit-container">
                                <button type="submit" id="phone-submit-btn" class="key-fob w-16 h-16 rounded-full flex items-center justify-center outline-none group border-2 border-[#1a1a1a]">
                                    <i id="key-icon" class="ph-fill ph-key text-2xl text-brand-light group-hover:text-white key-icon-turn"></i>
                                </button>
                                <span class="text-[9px] font-mono uppercase text-brand-orange tracking-[0.2em] mt-3 opacity-70">Turn Key to Transmit</span>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Custom HUD Toast -->
        <div id="toast" class="absolute top-16 left-1/2 -translate-x-1/2 w-[90%] max-w-[350px] bg-[#111]/90 border border-brand-orange/40 rounded-xl p-3 shadow-2xl z-[200] flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-brand-dark flex items-center justify-center border border-brand-metal">
                <i id="toast-icon" class="ph-bold ph-info text-brand-orange text-lg"></i>
            </div>
            <span id="toast-msg" class="text-[11px] font-mono tracking-wide text-white uppercase mt-0.5"></span>
        </div>
        
        <!-- HIGH-END REDIRECT OVERLAY -->
        <div id="page-transition-overlay" class="absolute inset-0 z-[300] bg-black/0 pointer-events-none transition-all duration-[1200ms] ease-in-out flex items-center justify-center">
            <div id="transition-logo" class="opacity-0 scale-50 transition-all duration-[800ms] transform flex flex-col items-center justify-center mt-8">
                <i class="ph-fill ph-engine text-6xl text-brand-orange mb-4 drop-shadow-[0_0_20px_rgba(255,61,0,0.8)] animate-pulse"></i>
                <span class="font-display text-lg font-black tracking-[0.4em] text-white uppercase drop-shadow-md">Syncing</span>
            </div>
        </div>

    </main>

    <script>
        // --- 1. Cinematic Startup Sequence ---
        document.addEventListener("DOMContentLoaded", () => {
            const shutter = document.getElementById('garage-shutter');
            const floorGlow = document.getElementById('floor-glow');
            const appContent = document.getElementById('app-content');

            initMotiveSlider();

            setTimeout(() => {
                shutter.style.transform = 'translateY(-2px)';
                floorGlow.style.opacity = '1'; 
                if (navigator.vibrate) navigator.vibrate([40, 60, 40]);
            }, 1300);

            setTimeout(() => {
                shutter.style.transform = ''; 
                shutter.classList.add('shutter-open');
                if (navigator.vibrate) navigator.vibrate(150); 
                
                appContent.classList.add('dashboard-revealed');
            }, 1500);

            setTimeout(() => { shutter.remove(); }, 3500);
        });

        // --- 2. View Switching Logic ---
        function switchView(target) {
            const main = document.getElementById('view-main');
            const phone = document.getElementById('view-phone');

            if (target === 'view-phone') {
                main.style.transform = 'translateY(-30px) scale(0.92) rotateX(10deg)';
                main.style.opacity = '0';
                main.classList.add('pointer-events-none');

                phone.style.transform = 'translateY(0) scale(1) rotateX(0deg)';
                phone.style.opacity = '1';
                phone.classList.remove('pointer-events-none');
                
                setTimeout(() => document.getElementById('phone-input').focus(), 600);
            } else {
                phone.style.transform = 'translateY(40px) scale(0.92) rotateX(-10deg)';
                phone.style.opacity = '0';
                phone.classList.add('pointer-events-none');

                main.style.transform = 'translateY(0) scale(1) rotateX(0deg)';
                main.style.opacity = '1';
                main.classList.remove('pointer-events-none');
                
                resetPhoneFlow();
            }
            if (navigator.vibrate) navigator.vibrate(20); 
        }

        // --- 3. HIGH END REDIRECT LOGIC ---
        function triggerSuccessRedirect() {
            const overlay = document.getElementById('page-transition-overlay');
            const transitionLogo = document.getElementById('transition-logo');
            const appContent = document.getElementById('app-content');
            const treadBg = document.getElementById('tread-bg');
            
            // Blur out the main UI components
            appContent.classList.add('content-fade-out');
            
            // Fade out decorative elements
            treadBg.style.opacity = '0';
            document.getElementById('corner-1').style.opacity = '0';
            document.getElementById('corner-2').style.opacity = '0';
            document.getElementById('corner-3').style.opacity = '0';
            document.getElementById('corner-4').style.opacity = '0';

            // Engage the heavy blur / black overlay
            overlay.classList.add('engaging');
            
            // Bring in the syncing logo after the background has started blurring
            setTimeout(() => {
                transitionLogo.classList.remove('opacity-0', 'scale-50');
                transitionLogo.classList.add('opacity-100', 'scale-100');
            }, 300);

            // Redirect smoothly to Home.html
            setTimeout(() => {
                window.location.href = 'home.html';
            }, 1800); // Wait 1.8 seconds for entire animation sequence to play out
        }

        // --- 4. Communication & Ignition Flow ---
        let isOtpMode = false;

        function handlePhoneSubmit(e) {
            e.preventDefault();
            const btn = document.getElementById('phone-submit-btn');
            const keyContainer = document.getElementById('key-submit-container');
            const phoneInputGroup = document.getElementById('phone-input-group');
            const phoneInput = document.getElementById('phone-input');
            const otpSection = document.getElementById('otp-section');
            const wrapper = document.getElementById('ignition-wrapper');
            const ignitionBtn = document.getElementById('ignition-btn');
            const ignitionIcon = document.getElementById('ignition-icon');

            if (!isOtpMode) {
                if (phoneInput.value.length < 5) {
                    showToast("ERR: Invalid Coordinates.", "ph-warning-circle", "text-brand-red");
                    return;
                }

                btn.classList.add('turning');
                if (navigator.vibrate) navigator.vibrate([20, 30]);
                
                setTimeout(() => {
                    isOtpMode = true;
                    
                    phoneInputGroup.style.opacity = '0';
                    phoneInputGroup.style.height = '0px';
                    phoneInputGroup.style.overflow = 'hidden';
                    keyContainer.style.display = 'none';
                    
                    otpSection.classList.remove('hidden');
                    otpSection.classList.add('flex');
                    
                    ignitionBtn.disabled = false;
                    wrapper.classList.add('glowing');
                    ignitionIcon.classList.remove('text-brand-dark', 'opacity-50');
                    ignitionIcon.classList.add('text-black');
                    
                    showToast("Code Dispatched via Commlink.", "ph-check-circle", "text-brand-orange");
                    
                    setTimeout(() => document.querySelector('.otp-box').focus(), 400);
                    if (navigator.vibrate) navigator.vibrate([30, 50, 30]); 
                }, 800);

            } else {
                const otpBoxes = document.querySelectorAll('.otp-box');
                let code = '';
                otpBoxes.forEach(b => code += b.value);

                if (code.length < 4) {
                    showToast("ERR: Sequence Incomplete.", "ph-warning-circle", "text-brand-red");
                    return;
                }

                ignitionIcon.className = "ph-bold ph-spinner animate-spin text-2xl text-white z-10";
                
                setTimeout(() => {
                    wrapper.classList.add('success');
                    ignitionIcon.className = "ph-fill ph-check-circle text-3xl text-white z-10 drop-shadow-[0_0_10px_rgba(0,0,0,0.5)]";
                    showToast("Engine Ignited. Welcome Rider.", "ph-engine", "text-green-500");
                    if (navigator.vibrate) navigator.vibrate([100, 50, 200, 50, 300]); 
                    
                    // Trigger Custom High-End Redirect Animation
                    setTimeout(() => {
                        triggerSuccessRedirect();
                    }, 800); // 800ms pause to let user see "Success" checkmark
                }, 1500);
            }
        }

        function resetPhoneFlow() {
            isOtpMode = false;
            const phoneInputGroup = document.getElementById('phone-input-group');
            phoneInputGroup.style.opacity = '1';
            phoneInputGroup.style.height = 'auto';
            document.getElementById('phone-input').value = '';
            
            document.getElementById('otp-section').classList.add('hidden');
            document.getElementById('otp-section').classList.remove('flex');
            
            const keyContainer = document.getElementById('key-submit-container');
            keyContainer.style.display = 'flex';
            
            const btn = document.getElementById('phone-submit-btn');
            btn.classList.remove('turning');
            
            const wrapper = document.getElementById('ignition-wrapper');
            const ignitionBtn = document.getElementById('ignition-btn');
            const ignitionIcon = document.getElementById('ignition-icon');
            
            ignitionBtn.disabled = true;
            wrapper.classList.remove('glowing', 'success');
            ignitionIcon.className = "ph-bold ph-power text-2xl text-brand-dark z-10 opacity-50";
            
            document.querySelectorAll('.otp-box').forEach(b => b.value = '');
        }

        // OTP Input Logic
        const otpBoxes = document.querySelectorAll('.otp-box');
        otpBoxes.forEach((box, index) => {
            box.addEventListener('input', (e) => {
                e.target.value = e.target.value.replace(/[^0-9]/g, '');
                if (e.target.value !== '' && index < otpBoxes.length - 1) {
                    otpBoxes[index + 1].focus();
                }
            });
            box.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
                    otpBoxes[index - 1].focus();
                }
            });
        });

        function mockAction(name, btnElement) {
            const originalContent = btnElement.innerHTML;
            btnElement.innerHTML = `<i class="ph-bold ph-spinner animate-spin text-xl text-brand-light"></i> <span class="font-bold text-brand-light tracking-wider font-display uppercase text-sm">Authenticating...</span>`;
            
            setTimeout(() => {
                btnElement.innerHTML = originalContent;
                showToast(`Protocol ${name} Verified.`, "ph-check-circle", "text-green-500");
                if (navigator.vibrate) navigator.vibrate([50, 100]); 
                
                // Trigger Custom High-End Redirect Animation
                setTimeout(() => {
                    triggerSuccessRedirect();
                }, 600);
            }, 1500);
        }

        let toastTimeout;
        function showToast(msg, iconClass, colorClass) {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            
            document.getElementById('toast-msg').textContent = msg;
            icon.className = `ph-bold ${iconClass} text-lg ${colorClass}`;
            
            toast.classList.add('show');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3500);
        }

        // --- 5. Background Slider ---
        function initMotiveSlider() {
            const sliderContainer = document.getElementById('motive-slider');
            if (!sliderContainer) return;

            const motives = [
                { icon: 'ph-users-three', title: 'Pack Sync', desc: 'Global Rider Network Connectivity' },
                { icon: 'ph-map-trifold', title: 'Live Telemetry', desc: 'Precision Route & Altitude Tracking' },
                { icon: 'ph-shield-check', title: 'Encrypted Comms', desc: 'Secure Peer-to-Peer Intercom' },
                { icon: 'ph-engine', title: 'Performance', desc: 'Real-time Vehicle Diagnostics' },
                { icon: 'ph-warning-circle', title: 'SOS Protocol', desc: 'Automated Crash Detection & Alert' },
                { icon: 'ph-share-network', title: 'Route Sharing', desc: 'Community Waypoints & Hazards' },
                { icon: 'ph-garage', title: 'Asset Mgmt', desc: 'Digital Garage Inventory System' }
            ];

            motives.forEach((motive, index) => {
                const el = document.createElement('div');
                el.className = `slide-item w-full h-full ${index === 0 ? 'active' : ''}`;
                
                el.innerHTML = `
                    <div class="w-32 h-32 rounded-3xl border border-brand-metal bg-black/60 flex items-center justify-center shrink-0 shadow-neon-intense mb-4">
                        <i class="ph-duotone ${motive.icon} text-6xl text-brand-orange"></i>
                    </div>
                    <div class="flex flex-col text-center gap-2">
                        <span class="font-display text-2xl uppercase tracking-[0.2em] font-black text-white drop-shadow-md">${motive.title}</span>
                        <span class="font-mono text-xs text-brand-light uppercase tracking-[0.15em] px-4 max-w-[280px] leading-relaxed opacity-80">${motive.desc}</span>
                    </div>
                `;
                sliderContainer.appendChild(el);
            });

            const slides = sliderContainer.querySelectorAll('.slide-item');
            if (slides.length === 0) return;
            
            let currentIndex = 0;

            setInterval(() => {
                const prevIndex = currentIndex;
                currentIndex = (currentIndex + 1) % slides.length;
                
                slides[prevIndex].classList.remove('active');
                slides[prevIndex].classList.add('exit');
                
                slides[currentIndex].classList.remove('exit');
                void slides[currentIndex].offsetWidth; 
                slides[currentIndex].classList.add('active');
            }, 3000);
        }
    </script>
</body>
